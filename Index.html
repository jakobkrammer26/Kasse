<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kassensystem (Verkäufer)</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background: #f4f4f9; color: #333; }
        .container { max-width: 400px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; }
        input, button { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        button { background: #3498db; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #2980b9; }
        .status { padding: 10px; border-radius: 6px; text-align: center; font-weight: bold; display: none; }
        .waiting { background: #ffeaa7; color: #d63031; }
        .success { background: #55efc4; color: #00b894; }
    </style>
</head>
<body>

<div class="container">
    <h2>Kassensystem 🛒</h2>
    
    <label for="amount">Betrag (€):</label>
    <input type="number" id="amount" placeholder="z.B. 14.50" step="0.01">

    <label for="code">4-stelliger Zahlungs-Code:</label>
    <input type="text" id="code" maxlength="4" placeholder="z.B. X$7a">

    <button onclick="starteZahlung()">Zahlung anfordern</button>

    <div id="statusBox" class="status"></div>
</div>

<script>
    let checkInterval;

    function starteZahlung() {
        const betrag = document.getElementById('amount').value;
        const code = document.getElementById('code').value;
        const statusBox = document.getElementById('statusBox');

        if (!betrag || code.length !== 4) {
            alert("Bitte gib einen Betrag und einen exakt 4-stelligen Code ein!");
            return;
        }

        // Daten im localStorage für den Kunden bereitstellen
        localStorage.setItem('zahlungs_betrag', betrag);
        localStorage.setItem('zahlungs_code', code);
        localStorage.setItem('zahlungs_status', 'wartet');

        statusBox.className = "status waiting";
        statusBox.style.display = "block";
        statusBox.innerText = `Warte auf Zahlung für ${betrag}€ mit Code: ${code}...`;

        // Intervall starten, um zu prüfen, ob der Kunde bezahlt hat
        clearInterval(checkInterval);
        checkInterval = setInterval(() => {
            const status = localStorage.getItem('zahlungs_status');
            if (status === 'bezahlt') {
                statusBox.className = "status success";
                statusBox.innerText = `✅ Erfolgreich bezahlt: ${betrag}€!`;
                clearInterval(checkInterval);
            }
        }, 1000);
    }
</script>

</body>
</html>
